name: SleepSkip
version: ${version}
main: me.Erotoro.sleepskip.SleepSkip
api-version: '1.21'
folia-supported: true
softdepend: [Essentials, CMI, PlaceholderAPI]
authors: [Erotoro]
description: SleepSkipUltra - smooth night skipping with acceleration, overlay UI, and Paper/Folia 1.21+ support
commands:
  sleep:
    description: SleepSkipUltra commands
    usage: /sleep <reload|status|broadcaststatus|forceskip>
permissions:
  sleepskip.admin:
    description: Access to SleepSkip admin commands
    default: op
  sleepskip.bypass:
    description: Excludes a player from SleepSkip counters
    default: false
