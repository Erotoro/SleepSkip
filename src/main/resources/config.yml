settings:
  language: "en" # en, ru, ua, de, es, fr, pl, pt, zh, it, cs, hi, tr, id, fi
  required-type: "percent" # fixed or percent
  required-value: 60

  ignore-afk: true
  afk-timeout: 300
  count-afk-sleepers: true

  actionbar-duration: 5
  transition-duration-ticks: 60 # 20 ticks = 1 second
  skip-rain: true
  weather-sleep-mode: "thunderstorm" # none, thunderstorm
  daytime-ticks: 0
  per-world: false
  use-actionbar: true

sleep:
  start-threshold-percent: 5
  max-speed-multiplier: 12.0
  update-interval-ticks: 5

overlay:
  enabled: true        # master switch for all on-screen feedback (titles and bossbar)
  mode: "both"         # title, bossbar, both
  update-interval-ticks: 10
  fade-in-ticks: 1
  stay-ticks: 24
  fade-out-ticks: 1
  show-status-before-skip: true
  show-progress-during-transition: true
  bossbar:
    allow-personal-toggle: true   # let players with sleepskip.bossbar.toggle run /sleep bossbar on|off
    default-visible: true         # default bossbar visibility for players who never toggled it
    style: "PROGRESS"             # PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    night-color: "BLUE"           # PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    weather-color: "BLUE"
    transition-color: "GREEN"
    acceleration-color: "YELLOW"

day-counter:
  enabled: true
  show-to-all: true
  announce-natural-sunrise: true
  fade-in-ticks: 10
  stay-ticks: 50
  fade-out-ticks: 20
  # Leave empty to use the active locale file.
  title-format: ""
  subtitle-format: ""
  animation:
    enabled: false
    mode: "typewriter" # static, typewriter
    step-interval-ticks: 2
    final-hold-ticks: 30
  sound:
    enabled: false
    type: "BLOCK_TRIPWIRE_CLICK_ON"
    volume: 0.7
    pitch: 1.35
    play-on-each-step: true
    play-on-finish: true

placeholders:
  offline-mode: "none" # none, global, fallback-world
  fallback-world: ""

# Anti-troll limits and world filtering. All optional; defaults below change nothing.
limits:
  min-players-online: 0     # require at least N eligible players online before a natural skip can happen (0 = off)
  skip-cooldown-seconds: 0  # minimum seconds between skips per world (0 = off). Admin /sleep forceskip ignores this.
  weighted-sleep: false     # honor the sleepskip.weight.<n> permission (a player counts as N sleepers)
  world-whitelist: []       # if non-empty, ONLY these worlds are managed (by name)
  world-blacklist: []       # these worlds are never managed (wins over the whitelist)

update-checker:
  enabled: true                 # check GitHub Releases for a newer version on startup
  notify-admins-on-join: true   # message players with sleepskip.admin when an update is available
  interval-hours: 6             # how often to re-check while running (0 disables periodic re-checks)

# Optional reward system. Disabled by default — turn it on only if you want to reward the
# players who slept when a night/storm skip completes.
rewards:
  enabled: false                # master switch (OFF by default)
  only-natural-skips: false     # true = no rewards when an admin used /sleep forceskip
  heal: false                   # restore each sleeper to full health
  feed: false                   # restore each sleeper's hunger and saturation
  experience: 0                 # experience points granted to each sleeper (0 = none)
  message: ""                   # optional MiniMessage sent to each rewarded sleeper (empty = none)
  # Potion effects applied to each sleeper. Uncomment to use:
  # potion-effects:
  #   - type: REGENERATION      # effect name (e.g. REGENERATION, SPEED, FIRE_RESISTANCE)
  #     duration-seconds: 10
  #     amplifier: 0            # 0 = level I
  #     ambient: true
  #     particles: false
  potion-effects: []
  # Console commands run once per sleeper; {player} is replaced with the name. Uncomment to use:
  # commands:
  #   - "give {player} minecraft:bread 4"
  commands: []

# Additional overrides for backward compatibility with versions released prior to localisation.
# If a key is present here, it takes precedence over the lang/<language>.yml file.
# Please move any custom messages you have created to lang/<language>.yml.
messages:
  # nightSkipped: "<#F6AD72>Good morning!"
  # weatherSkipped: "<#F6AD72>The thunderstorm has passed!"
  # nightSkipping: "<#F6AD72>Skipping the night..."
  # weatherSkipping: "<#F6AD72>Sleeping through the thunderstorm..."
  # sleepingStatus: "<#EC9793>{sleeping}/{needed} players are sleeping. Need <#EC9793>{needed} to skip the night!"
  # weatherSleepingStatus: "<#EC9793>{sleeping}/{needed} players are sleeping. Need <#EC9793>{needed} to sleep through the thunderstorm!"
  # not-enough: "<red>Not enough players are sleeping!"
  # no-permission: "<red>You do not have permission to use this command!"
  # reload-success: "<green>Config reloaded!"
  # status-message: "<#F6AD72>SleepSkip is running normally."
  # help-title: "<gold>=== SleepSkip Commands ==="
  # help-reload: "<yellow>/sleep reload - Reload config"
  # help-status: "<yellow>/sleep status - Check plugin status"
  # help-broadcaststatus: "<yellow>/sleep broadcaststatus - Broadcast plugin status"
