name: Bug report
description: Report a bug in SleepSkipUltra
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "Example: 1.9.0"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server version
      placeholder: "Example: Paper 1.21.4 / Folia 1.21.4 / Purpur 1.21.4"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Server platform
      options:
        - Paper
        - Folia
        - Purpur
        - Other Paper-based fork
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Example: Java 21"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe the bug clearly."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install plugin
        2. Start server
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error log
      description: Paste console errors or latest.log here.
      render: shell
    validations:
      required: false
